<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAKEnSHOP - Metro Shop</title>
    <style>
        body {
            background-color: #0d0d0d;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .05) 75%, rgba(255, 255, 255, .05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .05) 75%, rgba(255, 255, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: move-background 20s linear infinite;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        .main-title {
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #ff00de;
        }

        .sub-title {
            font-size: 20px;
            color: #ccc;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .image-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ff00de, #00ff9d);
            animation: spin-border 4s linear infinite;
            box-shadow: 0 0 20px rgba(255, 0, 222, 0.3);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #0d0d0d;
            animation: pulse-img 2s infinite ease-in-out;
        }

        .info-box {
            background: rgba(30, 30, 30, 0.8);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
            font-size: 16px;
            line-height: 1.8;
        }

        .info-list li {
            margin-bottom: 8px;
            font-weight: bold;
        }

        .telegram-btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            background: rgba(0,0,0,0.3);
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ff00de;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 222, 0.4), inset 0 0 10px rgba(255, 0, 222, 0.2);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .telegram-btn:hover {
            background: #ff00de;
            color: white;
            box-shadow: 0 0 30px rgba(255, 0, 222, 0.9);
            transform: scale(1.02);
        }

        @keyframes move-background {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }
        
        @keyframes pulse-img {
            0% { transform: scale(1); filter: brightness(100%); }
            50% { transform: scale(1.05); filter: brightness(120%); }
            100% { transform: scale(1); filter: brightness(100%); }
        }

        @keyframes spin-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .image-wrapper-fix {
            width: 100%;
            height: 100%;
            animation: spin-border-reverse 4s linear infinite;
        }
        @keyframes spin-border-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

    </style>
</head>
